<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOCket — Tableau de bord</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="topbar">
    <p class="brand">SOCket // Console SOC</p>
    <div class="who">
      <span id="who-username"></span>
      <span class="role-badge" id="who-role"></span>
      <button class="btn secondary" id="logout-btn" style="width:auto;padding:6px 12px;">Déconnexion</button>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <div class="filters">
        <select id="filter-severity">
          <option value="">Toutes sévérités</option>
          <option value="critique">Critique</option>
          <option value="haute">Haute</option>
          <option value="moyenne">Moyenne</option>
          <option value="basse">Basse</option>
        </select>
      </div>
      <button class="btn" id="new-incident-btn" style="width:auto;padding:8px 16px;">+ Nouvel incident</button>
    </div>

    <section class="board" id="board">
      <!-- colonnes générées en JS -->
    </section>
  </main>

  <!-- Modal détail incident -->
  <div class="overlay" id="detail-overlay" style="display:none;">
    <div class="modal" id="detail-modal"></div>
  </div>

  <!-- Modal nouvel incident -->
  <div class="overlay" id="new-overlay" style="display:none;">
    <div class="modal">
      <span class="close" data-close="new-overlay">&times;</span>
      <h2>Déclarer un incident</h2>
      <form id="new-incident-form">
        <div class="field">
          <label>Titre</label>
          <input type="text" class="full" name="title" required />
        </div>
        <div class="field">
          <label>Description</label>
          <textarea name="description" rows="4" class="full"></textarea>
        </div>
        <div class="field">
          <label>Sévérité</label>
          <select name="severity" class="full" required>
            <option value="basse">Basse</option>
            <option value="moyenne">Moyenne</option>
            <option value="haute">Haute</option>
            <option value="critique">Critique</option>
          </select>
        </div>
        <div class="field">
          <label>Catégorie</label>
          <input type="text" class="full" name="category" placeholder="phishing, malware, acces..." />
        </div>
        <button type="submit" class="btn">Créer l'incident</button>
        <p class="error-msg" id="new-error"></p>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
