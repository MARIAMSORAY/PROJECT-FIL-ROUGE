name: CI - SOCket

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Installation des dépendances backend
        working-directory: ./backend
        run: npm install

      - name: Analyse des vulnérabilités des dépendances (npm audit)
        working-directory: ./backend
        run: npm audit --audit-level=high || true
        # `|| true` pour ne pas bloquer la démo : à retirer en contexte
        # réel pour faire échouer le pipeline sur vulnérabilité critique.

      - name: Analyse statique du code (SAST - semgrep)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten

      - name: Build de l'image Docker backend
        run: docker build -t socket-backend:ci ./backend

      - name: Scan de l'image Docker (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: socket-backend:ci
          severity: CRITICAL,HIGH
          exit-code: '0' # passer à '1' pour bloquer le pipeline en prod
